name: Deploy

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

# Only one deploy at a time
concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/app

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Build & Push Docker Images to GitHub Container Registry
  # -------------------------------------------------------------------------
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        run: |
          SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build & push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

    outputs:
      sha: ${{ steps.tags.outputs.sha }}

  # -------------------------------------------------------------------------
  # Job 2: Deploy to Server via SSH
  # -------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-push
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/legalscout' }}

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Pulling latest images ==="
            docker pull ${{ env.IMAGE }}:${{ needs.build-push.outputs.sha }}

            # Tag as latest locally
            docker tag ${{ env.IMAGE }}:${{ needs.build-push.outputs.sha }} scout:latest

            echo "=== Running database migrations ==="
            docker compose exec -T scout-api python -m db.migrate || true

            echo "=== Restarting services ==="
            docker compose up -d --no-build

            echo "=== Waiting for health check ==="
            for i in $(seq 1 30); do
              if curl -sf http://localhost/health > /dev/null 2>&1; then
                echo "Deploy successful! Health check passed."
                exit 0
              fi
              echo "  Waiting... ($i/30)"
              sleep 5
            done

            echo "ERROR: Health check failed after deploy!"
            docker compose logs --tail 50
            exit 1

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "=== Service Status ==="
            cd ${{ secrets.DEPLOY_PATH || '/opt/legalscout' }}
            docker compose ps
            echo ""
            echo "=== Health Check ==="
            curl -s http://localhost/health | python3 -m json.tool
            echo ""
            echo "=== Deployed SHA: ${{ needs.build-push.outputs.sha }} ==="

  # -------------------------------------------------------------------------
  # Job 3: Post-Deploy Smoke Test
  # -------------------------------------------------------------------------
  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.environment == 'production'

    steps:
      - name: Test public endpoints
        run: |
          DOMAIN="${{ secrets.DOMAIN }}"
          if [ -z "$DOMAIN" ]; then
            echo "DOMAIN secret not set, skipping smoke test"
            exit 0
          fi

          echo "Testing https://$DOMAIN/health ..."
          response=$(curl -sf "https://$DOMAIN/health" || curl -sf "http://$DOMAIN/health")
          echo "$response" | python3 -m json.tool

          status=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$status" != "healthy" ]; then
            echo "SMOKE TEST FAILED: status=$status"
            exit 1
          fi
          echo "Smoke test passed!"
