name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: 1
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/legalscout

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Code Quality (lint, format, type-check)
  # -------------------------------------------------------------------------
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint check (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy .

  # -------------------------------------------------------------------------
  # Job 2: Docker Build Test — verify images build successfully
  # -------------------------------------------------------------------------
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build single image (API + Frontend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: legalscout:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -------------------------------------------------------------------------
  # Job 3: Security Scan — container vulnerability scanning
  # -------------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: legalscout:scan
          cache-from: type=gha

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: legalscout:scan
          format: table
          exit-code: 0  # Don't fail on vulnerabilities (report only)
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan repo for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # -------------------------------------------------------------------------
  # Job 4: Integration Test — spin up full stack and test API
  # -------------------------------------------------------------------------
  integration-test:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          DB_USER=scout
          DB_PASS=test-password-ci
          DB_DATABASE=legalscout
          JWT_SECRET_KEY=ci-test-secret-key-not-for-production-use-1234
          ADMIN_EMAIL=admin@test.com
          ADMIN_PASSWORD=testpassword123
          OPENAI_API_KEY=sk-test-not-real
          OPENROUTER_API_KEY=sk-or-test-not-real
          RUNTIME_ENV=dev
          API_HOST=http://localhost:8001
          EOF

      - name: Start services
        run: |
          docker compose -f compose.yaml -f compose.dev.yaml up -d scout-db scout-api
          echo "Waiting for API to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "API is ready!"
              break
            fi
            echo "  Attempt $i/60..."
            sleep 5
          done

      - name: Test health endpoint
        run: |
          response=$(curl -sf http://localhost:8001/health)
          echo "$response" | python3 -m json.tool
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'healthy', f'Expected healthy, got {data[\"status\"]}'
          assert data['database']['status'] == 'connected', 'Database not connected'
          print('Health check passed!')
          "

      - name: Test auth endpoints
        run: |
          # Test login
          response=$(curl -sf -X POST http://localhost:8001/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@test.com","password":"testpassword123"}')
          echo "$response" | python3 -m json.tool

          # Extract token
          TOKEN=$(echo "$response" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "Got JWT token: ${TOKEN:0:20}..."

          # Test authenticated endpoint
          curl -sf http://localhost:8001/api/dashboard/stats \
            -H "Authorization: Bearer $TOKEN" | python3 -m json.tool

          echo "Auth tests passed!"

      - name: Test metrics endpoint
        run: |
          curl -sf http://localhost:8001/metrics | head -20
          echo "Metrics endpoint OK!"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail 100

      - name: Cleanup
        if: always()
        run: docker compose down -v
